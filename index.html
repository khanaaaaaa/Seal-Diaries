<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seal Diaries</title>
  <link rel="icon" type="image/png" href="images/favimg.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div id="coverWrap">
    <div id="cover">
      <div id="coverFront">
        <img src="images/sealcover.jpg" class="cover-img"/>
        <div class="cover-text">
          <h1>Seal Diaries</h1>
          <p class="subtitle">the life of a harbour seal</p>
          <p class="species">Phoca vitulina · Pacific Coast</p>
          <button onclick="openJournal()">Open Journal</button>
        </div>
      </div>
    </div>
  </div>

  <div id="journal" class="hidden">
    <div class="top-bar">
      <button onclick="closeJournal()">← Back</button>
      <span id="counter"></span>
    </div>
    <div class="spread">
      <div class="left-page">
        <img id="entryPhoto" src="" alt=""/>
      </div>
      <div class="right-page">
        <div class="page-top">
          <span class="day" id="entryDay"></span>
          <span class="weather" id="entryWeather"></span>
        </div>
        <p class="entry-text" id="entryText"></p>
      </div>
    </div>
    <div class="nav">
      <button id="prevBtn" onclick="prevPage()">← Prev</button>
      <button id="nextBtn" onclick="nextPage()">Next →</button>
    </div>
  </div>

  <script src="javascript/entries.js"></script>
  <script src="javascript/script.js"></script>
</body>
</html>
